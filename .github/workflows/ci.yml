name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (includes typecheck)
        run: npm run build
        env:
          # The build doesn't need a real key; route handlers read this at request time, not at build.
          # Keeping a dummy here prevents accidental failures if a future change pulls the env at module scope.
          ANTHROPIC_API_KEY: dummy-key-for-build-only
